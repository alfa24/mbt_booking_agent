services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8000"
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BACKEND_LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    command: uv run python -m backend.main
